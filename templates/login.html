<!DOCTYPE html>
<html>
<head>
<title>Sign In - Study Manager</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.login-btn{
background:#4e73df;
color:white;
}

.register-btn{
background:#858796;
color:white;
}

.msg{
text-align:center;
margin-top:10px;
font-size:14px;
}
</style>
</head>
<body>

<div class="card">
<h2>Study Manager</h2>

<input id="email" type="email" placeholder="Email address">
<input id="pass" type="password" placeholder="Password">

<button class="login-btn" onclick="login()">Sign In</button>
<button class="register-btn" onclick="register()">Create Account</button>

<div class="msg" id="msg"></div>
</div>

<script>

function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:document.getElementById("email").value,
password:document.getElementById("pass").value
})
})
.then(res=>res.json())
.then(data=>{
if(data.message){
window.location="/";
}else{
document.getElementById("msg").innerText=data.error;
}
});
}

function register(){
fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:document.getElementById("email").value,
password:document.getElementById("pass").value
})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("msg").innerText=data.message || data.error;
document.getElementById("email").value="";
document.getElementById("pass").value="";
});
}

</script>

</body>
</html>
