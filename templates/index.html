<!DOCTYPE html>
<html>
<head>
<title>Study Manager Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

<div class="sidebar-header">
<h2>📚 Study Manager</h2>
<p class="user-info">👤 {{ user }}</p>
</div>

<ul class="sidebar-menu">
<li onclick="showSection('home')">🏠 Home</li>
<li onclick="openRecycle()">🗑 Recycle Bin</li>
<li onclick="showSection('profile')">⚙ Profile</li>
<li onclick="logout()">🚪 Logout</li>
</ul>

</div>

<!-- ================= MAIN CONTENT ================= -->
<div class="main">

<!-- ===== HOME ===== -->
<div id="home" class="section">
<h1>Select Category</h1>

<!-- Stats will render here -->
<div id="statsContainer"></div>

<div class="card-grid">
<div class="card" onclick="openCategory('CA')">CA</div>
<div class="card" onclick="openCategory('Midterm')">Midterm</div>
<div class="card" onclick="openCategory('Endterm')">End Term</div>
<div class="card" onclick="openCategory('Practical')">Practical</div>
</div>

</div>

<!-- ===== SUBJECTS ===== -->
<div id="subjects" class="section hidden">

<button class="back-btn" onclick="showSection('home')">⬅ Back</button>

<h1 id="categoryTitle"></h1>

<div class="input-group">
<input id="subjectInput" placeholder="Add Subject">
<button onclick="addSubject()">Add</button>
</div>

<div id="subjectList"></div>

</div>

<!-- ===== UNITS ===== -->
<div id="units" class="section hidden">

<button class="back-btn" onclick="showSection('subjects')">⬅ Back</button>

<h1 id="subjectTitle"></h1>

<div id="unitList" class="card-grid"></div>

</div>

<!-- ===== NOTES ===== -->
<div id="notesPage" class="section hidden">

<button class="back-btn" onclick="showSection('units')">⬅ Back</button>

<h1 id="noteTitle"></h1>

<div class="action-buttons">
<button onclick="createNote()">📝 Add Note</button>
<button onclick="addFile()">📄 Upload File</button>
<input type="file" id="fileInput"
accept=".pdf,.doc,.docx,.png,.jpg,.jpeg"
style="display:none">
</div>

<div id="fileList"></div>

</div>

<!-- ===== EDITOR ===== -->
<div id="editorPage" class="section hidden">

<button class="back-btn" onclick="showSection('notesPage')">⬅ Back</button>
<button onclick="saveFile()">💾 Save</button>

<h2 id="editorTitle"></h2>

<div id="editorBox" contenteditable="true" class="editor"></div>

</div>

<!-- ===== RECYCLE BIN ===== -->
<div id="recycle" class="section hidden">

<h1>Recycle Bin</h1>

<button class="back-btn" onclick="showSection('home')">⬅ Back</button>

<div id="recycleList"></div>

</div>

<!-- ===== PROFILE ===== -->
<div id="profile" class="section hidden">

<button class="back-btn" onclick="showSection('home')">⬅ Back</button>

<h1>Change Password</h1>

<div style="max-width:400px;margin-top:20px;">
<input type="password" id="oldPass" placeholder="Current Password">
<br><br>
<input type="password" id="newPass" placeholder="New Password">
<br><br>
<button onclick="changePassword()">Update Password</button>
</div>

<p id="passMsg" style="margin-top:15px;"></p>

</div>

</div> <!-- end main -->

</div> <!-- end app -->

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
